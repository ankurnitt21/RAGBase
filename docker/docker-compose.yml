name: ragbase

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragbase-postgres
    environment:
      POSTGRES_DB: ragbase_db
      POSTGRES_USER: ragbase_admin
      POSTGRES_PASSWORD: ragbase_secret_2024
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ragbase_admin -d ragbase_db']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis/redis-stack:latest
    container_name: ragbase-redis
    ports:
      - '6379:6379'
      - '8001:8001'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ragbase-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5051:80'
    depends_on:
      - postgres
    restart: unless-stopped

  ragas:
    build:
      context: ../python-services/ragas-service
      dockerfile: Dockerfile
    container_name: ragbase-ragas
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - '8100:8100'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8100/health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  guardrails:
    build:
      context: ../python-services/guardrails-service
      dockerfile: Dockerfile
    container_name: ragbase-guardrails
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GUARD_MODEL: ${GUARD_MODEL:-llama-3.1-8b-instant}
      ENV: ${ENV:-dev}
    ports:
      - '8200:8200'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8200/health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
