management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

app:
  prompts:
    chat-system: classpath:prompts-dev/chat-system.st
    domain-router: classpath:prompts-dev/domain-router.st
    query-rewriter: classpath:prompts-dev/query-rewriter.st

logging:
  level:
    com.enterprise.aiassistant: DEBUG
    dev.langchain4j: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG
