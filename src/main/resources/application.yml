server:
  port: 8080

spring:
  application:
    name: ragbase
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/ai-assisstant
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# OpenAI — gpt-4o-mini (chat + routing) and text-embedding-3-small (embeddings)
openai:
  api-key: ${OPENAI_KEY}
  chat-model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
  chat-temperature: ${OPENAI_TEMPERATURE:0.3}
  chat-max-tokens: ${OPENAI_MAX_TOKENS:1024}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

# Pinecone Vector Store
pinecone:
  api-key: ${PINECONE_API_KEY}
  index-name: ${PINECONE_INDEX_NAME:knowledge-base}

# API Key auth (set API_KEY env var to enable; leave unset to disable in dev)
app:
  security:
    api-key: ${API_KEY:}

# Actuator
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      cache:
        time-to-live: 30s
  info:
    env:
      enabled: true

# App info shown at /actuator/info
info:
  app:
    name: RAGBase
    version: 1.0.0
    description: RAG-based knowledge assistant

# Resilience4j: rate limiter, retry, circuit breaker
resilience4j:
  ratelimiter:
    instances:
      api:
        limit-for-period: ${RATE_LIMIT_RPM:30}
        limit-refresh-period: 1m
        timeout-duration: 0
  retry:
    instances:
      llm:
        max-attempts: 3
        wait-duration: 1s
        ignore-exceptions:
          - com.enterprise.aiassistant.exception.ChatProcessingException
          - com.enterprise.aiassistant.exception.DocumentIngestionException
          - com.enterprise.aiassistant.exception.UnsupportedFileTypeException
      pinecone:
        max-attempts: 3
        wait-duration: 2s
        ignore-exceptions:
          - com.enterprise.aiassistant.exception.DocumentIngestionException
          - com.enterprise.aiassistant.exception.UnsupportedFileTypeException
          - java.io.IOException
  circuit-breaker:
    instances:
      llm:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
