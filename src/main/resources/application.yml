server:
  port: 8080

spring:
  application:
    name: ai-assistant

  # File upload limits
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # PostgreSQL datasource
  datasource:
    url: jdbc:postgresql://localhost:5432/ai-assisstant
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# OpenAI — used for gpt-4o-mini (chat) and text-embedding-3-small (embeddings)
openai:
  api-key: ${OPENAI_KEY}

# Pinecone Vector Store
pinecone:
  api-key: ${PINECONE_API_KEY}
  index-name: ${PINECONE_INDEX_NAME:knowledge-base}

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.enterprise.aiassistant: DEBUG
    org.springframework.ai: INFO
