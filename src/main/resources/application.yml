server:
  port: 8080

spring:
  application:
    name: ragbase
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/ragbase_db}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Groq — llama-3.3-70b-versatile (chat LLM via OpenAI-compatible API)
# Groq has no embedding model — OpenAI is used for embeddings separately.
groq:
  api-key: ${GROQ_API_KEY}
  base-url: https://api.groq.com/openai/v1
  chat-model: ${GROQ_CHAT_MODEL:llama-3.3-70b-versatile}
  fast-model: ${GROQ_FAST_MODEL:llama-3.1-8b-instant}
  chat-temperature: 0.0
  chat-max-tokens: 4096

# OpenAI — text-embedding-3-small (embeddings only)
# dimensions=384 matches the existing Pinecone knowledge-base index.
# text-embedding-3-small supports dimension reduction natively.
openai:
  api-key: ${OPENAI_API_KEY}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  embedding-dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:384}

# Pinecone Vector Store
pinecone:
  api-key: ${PINECONE_API_KEY}
  index-name: ${PINECONE_INDEX_NAME}

# API Key auth (set API_KEY env var to enable; leave unset to disable in dev)
app:
  security:
    api-key: ${API_KEY:}
  prompts:
    chat-system: classpath:prompts/chat-system.st
    domain-router: classpath:prompts/domain-router.st
    query-rewriter: classpath:prompts/query-rewriter.st
    ambiguity-check: classpath:prompts/ambiguity-check.st
  self-consistency:
    enabled: ${SELF_CONSISTENCY_ENABLED:false}
    samples: ${SELF_CONSISTENCY_SAMPLES:3}
  memory:
    recent-token-budget: ${MEMORY_RECENT_TOKENS:1500}
    summary-max-tokens: ${MEMORY_SUMMARY_MAX:400}
  semantic-cache:
    enabled: ${SEMANTIC_CACHE_ENABLED:true}
    similarity-threshold: ${SEMANTIC_CACHE_THRESHOLD:0.92}
    ttl-hours: ${SEMANTIC_CACHE_TTL_HOURS:24}
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    user: ${REDIS_USER}
    password: ${REDIS_PASSWORD}
    ssl: ${REDIS_SSL}

# LangSmith tracing via OpenTelemetry OTLP
langsmith:
  api-key: ${LANGSMITH_API_KEY:}
  endpoint: ${LANGSMITH_ENDPOINT:https://api.smith.langchain.com/otel/v1/traces}
  project: ${LANGSMITH_PROJECT:rag-system}

# RAGAS evaluation service
ragas:
  enabled: ${RAGAS_ENABLED:false}
  service-url: ${RAGAS_SERVICE_URL:http://localhost:8100}

# Actuator
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      cache:
        time-to-live: 30s
  info:
    env:
      enabled: true

# App info shown at /actuator/info
info:
  app:
    name: RAGBase
    version: 1.0.0
    description: RAG-based knowledge assistant

# Resilience4j: rate limiter, retry, circuit breaker
resilience4j:
  ratelimiter:
    instances:
      api:
        limit-for-period: ${RATE_LIMIT_RPM:30}
        limit-refresh-period: 1m
        timeout-duration: 0
  retry:
    instances:
      llm:
        max-attempts: 3
        wait-duration: 1s
        ignore-exceptions:
          - com.enterprise.aiassistant.exception.ChatProcessingException
          - com.enterprise.aiassistant.exception.DocumentIngestionException
          - com.enterprise.aiassistant.exception.UnsupportedFileTypeException
      pinecone:
        max-attempts: 3
        wait-duration: 2s
        ignore-exceptions:
          - com.enterprise.aiassistant.exception.DocumentIngestionException
          - com.enterprise.aiassistant.exception.UnsupportedFileTypeException
          - java.io.IOException
  circuitbreaker:
    instances:
      llm:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
