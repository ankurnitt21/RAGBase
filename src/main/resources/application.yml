server:
  port: 8080

spring:
  application:
    name: ragbase
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/ai-assisstant
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# OpenAI — gpt-4o-mini (chat + routing) and text-embedding-3-small (embeddings)
openai:
  api-key: ${OPENAI_KEY}
  chat-model: ${OPENAI_CHAT_MODEL}
  chat-temperature: ${OPENAI_TEMPERATURE}
  chat-max-tokens: ${OPENAI_MAX_TOKENS}
  embedding-model: ${OPENAI_EMBEDDING_MODEL}

# Pinecone Vector Store
pinecone:
  api-key: ${PINECONE_API_KEY}
  index-name: ${PINECONE_INDEX_NAME}

# API Key auth (set API_KEY env var to enable; leave unset to disable in dev)
app:
  security:
    api-key: ${API_KEY:}
  prompts:
    chat-system: classpath:prompts/chat-system.st
    domain-router: classpath:prompts/domain-router.st
    query-rewriter: classpath:prompts/query-rewriter.st
  self-consistency:
    # Set to true to run the LLM N times and select the most consistent answer.
    # Multiplies cost and latency by samples. Leave false unless answer accuracy
    # is critical and latency budget allows it.
    enabled: ${SELF_CONSISTENCY_ENABLED:false}
    samples: ${SELF_CONSISTENCY_SAMPLES:3}
  memory:
    # Token budget for verbatim recent messages (newest-first, always included).
    # ~1500 tokens ≈ 8–10 typical chat turns. Raise for richer context, lower to save cost.
    recent-token-budget: ${MEMORY_RECENT_TOKENS:1500}
    # Token budget for semantically relevant older messages picked by vector search.
    # These are injected between the summary/nothing and the recent block.
    semantic-token-budget: ${MEMORY_SEMANTIC_TOKENS:800}
    # If older messages (outside the recent window) exceed this many tokens,
    # the LLM summarises them instead of running semantic search.
    # ~1500 tokens ≈ 6–8 turns of older history before summarisation kicks in.
    summary-threshold-tokens: ${MEMORY_SUMMARY_THRESHOLD:1500}
    # Maximum tokens the generated summary itself may occupy in the context.
    summary-max-tokens: ${MEMORY_SUMMARY_MAX:400}
  semantic-cache:
    # Set to false to disable and always run the full pipeline.
    enabled: ${SEMANTIC_CACHE_ENABLED:true}
    # Cosine similarity threshold (0.0–1.0). Higher = stricter match required before
    # returning a cached answer. 0.92 catches paraphrases while avoiding false positives.
    similarity-threshold: ${SEMANTIC_CACHE_THRESHOLD:0.92}
    # Entry lifetime in hours. 0 = never expire (entries live until Redis eviction policy).
    ttl-hours: ${SEMANTIC_CACHE_TTL_HOURS:24}
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    user: ${REDIS_USER}
    password: ${REDIS_PASSWORD}
    # Redis Cloud uses plain TCP on the assigned port by default.
    # Set to true if your instance is configured with TLS.
    ssl: ${REDIS_SSL}

# Actuator
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      cache:
        time-to-live: 30s
  info:
    env:
      enabled: true

# App info shown at /actuator/info
info:
  app:
    name: RAGBase
    version: 1.0.0
    description: RAG-based knowledge assistant

# Resilience4j: rate limiter, retry, circuit breaker
resilience4j:
  ratelimiter:
    instances:
      api:
        limit-for-period: ${RATE_LIMIT_RPM:30}
        limit-refresh-period: 1m
        timeout-duration: 0
  retry:
    instances:
      llm:
        max-attempts: 3
        wait-duration: 1s
        ignore-exceptions:
          - com.enterprise.aiassistant.exception.ChatProcessingException
          - com.enterprise.aiassistant.exception.DocumentIngestionException
          - com.enterprise.aiassistant.exception.UnsupportedFileTypeException
      pinecone:
        max-attempts: 3
        wait-duration: 2s
        ignore-exceptions:
          - com.enterprise.aiassistant.exception.DocumentIngestionException
          - com.enterprise.aiassistant.exception.UnsupportedFileTypeException
          - java.io.IOException
  circuitbreaker:
    instances:
      llm:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
