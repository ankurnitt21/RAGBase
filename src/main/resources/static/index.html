<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Assistant</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
        background: #f0f2f5;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ─────────────────────────────────────────── */
      .header {
        background: #1a1a2e;
        color: #fff;
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        z-index: 10;
      }
      .header h1 {
        font-size: 18px;
        font-weight: 600;
      }
      .header-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: background 0.2s;
      }
      .btn-primary {
        background: #4361ee;
        color: #fff;
      }
      .btn-primary:hover {
        background: #3a56d4;
      }
      .btn-secondary {
        background: #e2e8f0;
        color: #334155;
      }
      .btn-secondary:hover {
        background: #cbd5e1;
      }
      .btn-danger {
        background: #ef4444;
        color: #fff;
      }
      .btn-danger:hover {
        background: #dc2626;
      }

      /* ── Layout ─────────────────────────────────────────── */
      .main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* ── Sidebar ────────────────────────────────────────── */
      .sidebar {
        width: 260px;
        background: #16213e;
        color: #cbd5e1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #0f3460;
      }
      .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid #0f3460;
      }
      .sidebar-header h2 {
        font-size: 14px;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .conversation-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .conv-item {
        padding: 10px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background 0.15s;
      }
      .conv-item:hover {
        background: #1a2744;
      }
      .conv-item.active {
        background: #4361ee;
        color: #fff;
      }
      .conv-item .conv-delete {
        opacity: 0;
        background: none;
        border: none;
        color: inherit;
        cursor: pointer;
        font-size: 14px;
        padding: 2px 6px;
        border-radius: 3px;
      }
      .conv-item:hover .conv-delete {
        opacity: 0.6;
      }
      .conv-item .conv-delete:hover {
        opacity: 1;
        background: rgba(255, 255, 255, 0.1);
      }

      /* ── Chat area ──────────────────────────────────────── */
      .chat-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #fff;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .message {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.55;
        word-wrap: break-word;
        white-space: pre-wrap;
      }
      .message.user {
        align-self: flex-end;
        background: #4361ee;
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .message.assistant {
        align-self: flex-start;
        background: #f1f5f9;
        color: #1e293b;
        border-bottom-left-radius: 4px;
      }
      .message .meta {
        margin-top: 8px;
        font-size: 11px;
        opacity: 0.7;
      }
      .message.assistant .sources {
        margin-top: 6px;
        font-size: 11px;
        color: #64748b;
      }
      .message.assistant .confidence {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .confidence.HIGH {
        background: #dcfce7;
        color: #166534;
      }
      .confidence.MEDIUM {
        background: #fef9c3;
        color: #854d0e;
      }
      .confidence.LOW {
        background: #fee2e2;
        color: #991b1b;
      }

      .empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #94a3b8;
        font-size: 15px;
        text-align: center;
        padding: 40px;
      }
      .empty-state h2 {
        font-size: 20px;
        margin-bottom: 8px;
        color: #64748b;
      }

      /* ── Input bar ──────────────────────────────────────── */
      .input-bar {
        padding: 16px 24px;
        border-top: 1px solid #e2e8f0;
        display: flex;
        gap: 10px;
        background: #fff;
      }
      .input-bar textarea {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        resize: none;
        height: 44px;
        max-height: 120px;
        outline: none;
        transition: border-color 0.2s;
      }
      .input-bar textarea:focus {
        border-color: #4361ee;
      }
      .input-bar button {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        border: none;
        background: #4361ee;
        color: #fff;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      .input-bar button:hover {
        background: #3a56d4;
      }
      .input-bar button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      /* ── Upload modal ───────────────────────────────────── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal {
        background: #fff;
        border-radius: 12px;
        padding: 28px;
        width: 420px;
        max-width: 90vw;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      }
      .modal h2 {
        font-size: 18px;
        margin-bottom: 16px;
      }
      .drop-zone {
        border: 2px dashed #cbd5e1;
        border-radius: 8px;
        padding: 40px 20px;
        text-align: center;
        color: #94a3b8;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        margin-bottom: 16px;
      }
      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: #4361ee;
        background: #eef2ff;
      }
      .drop-zone input {
        display: none;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
      .upload-status {
        font-size: 13px;
        margin-bottom: 12px;
        padding: 8px;
        border-radius: 6px;
        display: none;
      }
      .upload-status.success {
        display: block;
        background: #dcfce7;
        color: #166534;
      }
      .upload-status.error {
        display: block;
        background: #fee2e2;
        color: #991b1b;
      }

      /* ── Typing indicator ───────────────────────────────── */
      .typing-indicator {
        display: none;
        align-self: flex-start;
        padding: 12px 16px;
        background: #f1f5f9;
        border-radius: 12px;
        border-bottom-left-radius: 4px;
      }
      .typing-indicator.active {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .typing-indicator span {
        width: 8px;
        height: 8px;
        background: #94a3b8;
        border-radius: 50%;
        animation: bounce 0.6s infinite alternate;
      }
      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes bounce {
        to {
          transform: translateY(-6px);
          opacity: 0.4;
        }
      }

      /* ── Responsive ─────────────────────────────────────── */
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .message {
          max-width: 90%;
        }
      }

      /* ── Domain buttons & badges ─────────────────────────── */
      .domain-btn {
        background: #e2e8f0;
        color: #334155;
        border: 2px solid transparent;
        transition: all 0.15s;
      }
      .domain-btn.active {
        background: #4361ee;
        color: #fff;
        border-color: #3a56d4;
      }
      .domain-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        margin-right: 4px;
      }
      .domain-badge.HR {
        background: #dbeafe;
        color: #1e40af;
      }
      .domain-badge.PRODUCT {
        background: #fce7f3;
        color: #9d174d;
      }
      .domain-badge.AI {
        background: #ede9fe;
        color: #6b21a8;
      }

      .upload-item {
        font-size: 13px;
        padding: 6px 10px;
        margin-bottom: 4px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .upload-item.pending {
        background: #e0f2fe;
        color: #0369a1;
      }
      .upload-item.success {
        background: #dcfce7;
        color: #166534;
      }
      .upload-item.error {
        background: #fee2e2;
        color: #991b1b;
      }
      .upload-item .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #94a3b8;
        border-top-color: #0369a1;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>&#x1F4DA; Knowledge Assistant</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="openUploadModal()">&#x1F4CE; Upload Document</button>
        <button class="btn btn-primary" onclick="newConversation()">&#x2B; New Chat</button>
      </div>
    </div>

    <div class="main">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">
          <h2>Conversations</h2>
        </div>
        <div class="conversation-list" id="conversationList"></div>
      </div>

      <!-- Chat -->
      <div class="chat-container">
        <div class="messages" id="messages">
          <div class="empty-state" id="emptyState">
            <div>
              <h2>Welcome!</h2>
              <p>Upload a document and start asking questions.<br />Your conversations are saved locally.</p>
            </div>
          </div>
        </div>
        <div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>
        <div class="input-bar">
          <textarea
            id="questionInput"
            placeholder="Ask a question..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"></textarea>
          <button id="sendBtn" onclick="sendMessage()" title="Send">&#x27A4;</button>
        </div>
      </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="uploadModal">
      <div class="modal">
        <h2>&#x1F4C4; Upload Document</h2>
        <div style="margin-bottom: 14px">
          <label style="font-size: 13px; font-weight: 500; color: #334155; display: block; margin-bottom: 6px"
            >Domain Namespace</label
          >
          <div style="display: flex; gap: 8px" id="domainSelector">
            <button class="btn domain-btn active" data-domain="HR" onclick="selectDomain('HR')">&#x1F465; HR</button>
            <button class="btn domain-btn" data-domain="PRODUCT" onclick="selectDomain('PRODUCT')">
              &#x1F4E6; Product
            </button>
            <button class="btn domain-btn" data-domain="AI" onclick="selectDomain('AI')">&#x1F916; AI</button>
          </div>
        </div>
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <p>Drop PDF or text files here, or click to browse</p>
          <p style="font-size: 12px; margin-top: 8px">Max 10 MB per file · Multiple files supported</p>
          <input type="file" id="fileInput" accept=".pdf,.txt,.md,.csv" multiple onchange="handleFiles(this.files)" />
        </div>
        <div id="uploadResults"></div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeUploadModal()">Close</button>
        </div>
      </div>
    </div>

    <script>
      const API = '/api/v1';
      let conversations = JSON.parse(localStorage.getItem('ka_conversations') || '{}');
      let activeConvId = null;
      let selectedDomain = 'HR';

      // ── Domain selector ─────────────────────────────────
      function selectDomain(domain) {
        selectedDomain = domain;
        document.querySelectorAll('.domain-btn').forEach((b) => {
          b.classList.toggle('active', b.dataset.domain === domain);
        });
      }

      // ── Conversation management ─────────────────────────
      function saveConversations() {
        localStorage.setItem('ka_conversations', JSON.stringify(conversations));
      }

      function newConversation() {
        const id = 'conv-' + Date.now();
        conversations[id] = { name: 'New Chat', messages: [] };
        saveConversations();
        setActiveConversation(id);
      }

      function setActiveConversation(id) {
        activeConvId = id;
        renderSidebar();
        renderMessages();
        document.getElementById('questionInput').focus();
      }

      function deleteConversation(id, e) {
        e.stopPropagation();
        delete conversations[id];
        saveConversations();
        if (activeConvId === id) {
          const ids = Object.keys(conversations);
          activeConvId = ids.length > 0 ? ids[ids.length - 1] : null;
        }
        renderSidebar();
        renderMessages();
      }

      function renderSidebar() {
        const list = document.getElementById('conversationList');
        const ids = Object.keys(conversations).reverse();
        list.innerHTML = ids
          .map((id) => {
            const c = conversations[id];
            const active = id === activeConvId ? 'active' : '';
            const name = c.name.length > 28 ? c.name.substring(0, 28) + '...' : c.name;
            return `<div class="conv-item ${active}" onclick="setActiveConversation('${id}')">
                        <span>${escapeHtml(name)}</span>
                        <button class="conv-delete" onclick="deleteConversation('${id}', event)" title="Delete">&times;</button>
                    </div>`;
          })
          .join('');
      }

      function renderMessages() {
        const container = document.getElementById('messages');
        const empty = document.getElementById('emptyState');

        if (!activeConvId || !conversations[activeConvId] || conversations[activeConvId].messages.length === 0) {
          empty.style.display = 'flex';
          // Remove only message nodes, keep emptyState in DOM
          Array.from(container.children).forEach(c => { if (c !== empty) c.remove(); });
          return;
        }

        empty.style.display = 'none';
        // Remove old message nodes, keep emptyState in DOM
        Array.from(container.children).forEach(c => { if (c !== empty) c.remove(); });

        const msgs = conversations[activeConvId].messages;
        const fragment = document.createDocumentFragment();
        msgs.forEach((m) => {
          const div = document.createElement('div');
          if (m.role === 'user') {
            div.className = 'message user';
            div.textContent = m.content;
          } else {
            div.className = 'message assistant';
            div.textContent = m.content;
            let meta = '';
            if (m.routedDomain) meta += `<span class="domain-badge ${m.routedDomain}">${m.routedDomain}</span> `;
            if (m.confidence)   meta += `<span class="confidence ${m.confidence}">${m.confidence}</span> `;
            if (m.sources && m.sources.length > 0) meta += `<div class="sources">Sources: ${m.sources.map(escapeHtml).join(', ')}</div>`;
            if (meta) {
              const metaDiv = document.createElement('div');
              metaDiv.className = 'meta';
              metaDiv.innerHTML = meta;
              div.appendChild(metaDiv);
            }
          }
          fragment.appendChild(div);
        });
        container.appendChild(fragment);
        container.scrollTop = container.scrollHeight;
      }

      // ── Chat ────────────────────────────────────────────
      async function sendMessage() {
        const input = document.getElementById('questionInput');
        const question = input.value.trim();
        if (!question) return;

        if (!activeConvId) newConversation();

        const conv = conversations[activeConvId];
        conv.messages.push({ role: 'user', content: question });

        // Update conversation name from first message
        if (conv.messages.filter((m) => m.role === 'user').length === 1) {
          conv.name = question.substring(0, 40);
        }

        saveConversations();
        renderMessages();
        renderSidebar();
        input.value = '';
        input.style.height = '44px';

        // Show typing indicator
        const typing = document.getElementById('typingIndicator');
        typing.classList.add('active');
        document.getElementById('sendBtn').disabled = true;

        try {
          const res = await fetch(API + '/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ conversationId: activeConvId, question })
          });

          if (!res.ok) throw new Error('Server returned ' + res.status);
          const data = await res.json();

          conv.messages.push({
            role: 'assistant',
            content: data.answer,
            confidence: data.confidence,
            sources: data.sources,
            routedDomain: data.routedDomain
          });
        } catch (err) {
          conv.messages.push({
            role: 'assistant',
            content: 'Error: ' + err.message,
            confidence: 'LOW',
            sources: []
          });
        }

        typing.classList.remove('active');
        document.getElementById('sendBtn').disabled = false;
        saveConversations();
        renderMessages();
      }

      function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      function autoResize(el) {
        el.style.height = '44px';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      }

      // ── Upload ──────────────────────────────────────────
      function openUploadModal() {
        document.getElementById('uploadModal').classList.add('active');
      }
      function closeUploadModal() {
        document.getElementById('uploadModal').classList.remove('active');
        document.getElementById('uploadResults').innerHTML = '';
      }

      const dropZone = document.getElementById('dropZone');
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
      });

      async function handleFiles(fileList) {
        if (!fileList || fileList.length === 0) return;
        const results = document.getElementById('uploadResults');

        if (fileList.length === 1) {
          // Single file — sync upload
          const file = fileList[0];
          const itemId = 'upload-' + Date.now();
          results.innerHTML += `<div class="upload-item pending" id="${itemId}"><div class="spinner"></div> ${escapeHtml(file.name)} → ${selectedDomain}...</div>`;

          const formData = new FormData();
          formData.append('file', file);
          formData.append('domain', selectedDomain);

          try {
            const res = await fetch(API + '/documents', { method: 'POST', body: formData });
            if (!res.ok) throw new Error('Upload failed: ' + res.status);
            const data = await res.json();
            document.getElementById(itemId).className = 'upload-item success';
            document.getElementById(itemId).innerHTML =
              `&#x2714; ${escapeHtml(file.name)} → ${data.domain} (${data.status})`;
          } catch (err) {
            document.getElementById(itemId).className = 'upload-item error';
            document.getElementById(itemId).innerHTML = `&#x2718; ${escapeHtml(file.name)}: ${err.message}`;
          }
        } else {
          // Multi-file — async bulk upload
          const formData = new FormData();
          for (const file of fileList) {
            formData.append('files', file);
            const itemId = 'upload-' + Date.now() + '-' + file.name.replace(/\W/g, '');
            results.innerHTML += `<div class="upload-item pending" id="${itemId}"><div class="spinner"></div> ${escapeHtml(file.name)} → ${selectedDomain} (queuing...)</div>`;
          }
          formData.append('domain', selectedDomain);

          try {
            const res = await fetch(API + '/documents/bulk', { method: 'POST', body: formData });
            if (!res.ok) throw new Error('Bulk upload failed: ' + res.status);
            const data = await res.json();
            // Update all pending items
            const items = results.querySelectorAll('.upload-item.pending');
            data.forEach((d, i) => {
              if (items[i]) {
                items[i].className = 'upload-item success';
                items[i].innerHTML = `&#x2714; ${escapeHtml(d.filename)} → ${d.domain} (${d.status})`;
              }
            });
          } catch (err) {
            const items = results.querySelectorAll('.upload-item.pending');
            items.forEach((item) => {
              item.className = 'upload-item error';
              item.innerHTML = `&#x2718; ${err.message}`;
            });
          }
        }

        document.getElementById('fileInput').value = '';
      }

      // ── Util ────────────────────────────────────────────
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // ── Init ────────────────────────────────────────────
      renderSidebar();
      renderMessages();
    </script>
  </body>
</html>
